<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Wishlist Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>Amazon Wishlist Tracker</h1>
  <nav>
    <a href="/deals" class="{{ 'active' if active == 'deals' }}">Deals</a>
    <a href="/books" class="{{ 'active' if active == 'books' }}">All Books</a>
    <a href="/no-price" class="{{ 'active' if active == 'no_price' }}">No Price</a>
    <a href="/price-drops" class="{{ 'active' if active == 'price_drops' }}">Price Drops</a>
    <a href="/purchased" class="{{ 'active' if active == 'purchased' }}">Purchased</a>
    <a href="/wishlists" class="{{ 'active' if active == 'wishlists' }}">Wishlists</a>
    <a href="/login" class="{{ 'active' if active == 'login' }}">Login</a>
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
<script>
(function () {
  document.addEventListener('change', async function (e) {
    var cb = e.target.closest && e.target.closest('.purchased-cb');
    if (!cb) return;
    cb.disabled = true;
    try {
      var r = await fetch('/api/books/' + encodeURIComponent(cb.dataset.asin) + '/purchased', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({purchased: cb.checked}),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var tr = cb.closest('tr');
      if (tr) {
        tr.style.transition = 'opacity .25s';
        tr.style.opacity = '0.3';
        setTimeout(function () { tr.remove(); }, 250);
      }
    } catch (err) {
      cb.checked = !cb.checked;
      cb.disabled = false;
      console.error('Failed to update purchased flag:', err);
    }
  });
})();
</script>
</body>
</html>
