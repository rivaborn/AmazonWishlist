<form class="filters" method="get">
  <label>Min $ off
    <input type="number" step="0.01" min="0" name="min_dollar" value="{{ min_dollar }}">
  </label>
  <label>Min % off
    <input type="number" step="1" min="0" max="100" name="min_pct" value="{{ min_pct }}">
  </label>
  <label>Basis
    <select name="basis">
      <option value="prev" {% if basis == 'prev' %}selected{% endif %}>vs. previous price</option>
      <option value="list" {% if basis == 'list' %}selected{% endif %}>vs. list price</option>
    </select>
  </label>
  <button type="submit">Apply</button>
</form>
